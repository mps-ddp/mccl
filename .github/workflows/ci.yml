# MCCL only builds on macOS Apple Silicon. Hosted macos-14+ runners are arm64 (M-series).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            .github/workflows/ci.yml

      - name: Install dependencies
        env:
          MCCL_REQUIRE_METALLIB: "1"
        run: |
          python -m pip install --upgrade pip
          pip install numpy "pytest>=7.0" "pytest-timeout>=2.1" "setuptools>=68.0" "wheel>=0.41"
          # Nightly torch for MPS / c10d API coverage; build must use this env (no isolation).
          pip install --pre torch --index-url https://download.pytorch.org/whl/nightly/cpu
          pip install -e . --no-deps --no-build-isolation

      - name: Smoke tests (build + local 2-process DDP)
        run: pytest -v tests/test_build.py tests/test_ddp.py
